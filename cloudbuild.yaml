steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:latest'
      - './backend'

  # Step 2: Push image with commit SHA tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:$COMMIT_SHA'

  # Step 3: Push image with latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:latest'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'brain-tumor-backend'
      - '--image=us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=120'
      - '--port=8080'

# Store build images in Artifact Registry
images:
  - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:latest'

# Build timeout
timeout: '1200s'