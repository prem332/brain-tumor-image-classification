steps:
  # ── BACKEND ─────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:$BUILD_ID'
      - '-t'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:latest'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'brain-tumor-backend'
      - '--image=us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:$BUILD_ID'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=120'
      - '--port=8080'

  # ── FRONTEND ────────────────────────────────────────────

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    waitFor: ['deploy-backend']
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/frontend:$BUILD_ID'
      - '-t'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/frontend:latest'
      - './frontend'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend']
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/frontend'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'brain-tumor-frontend'
      - '--image=us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/frontend:$BUILD_ID'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--port=3000'

images:
  - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:$BUILD_ID'
  - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/frontend:$BUILD_ID'

timeout: '1800s'
