steps:
  # ── BACKEND ─────────────────────────────────────────────

  # Step 1: Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:latest'
      - './backend'

  # Step 2: Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend'

  # Step 3: Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'brain-tumor-backend'
      - '--image=us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=120'
      - '--port=8080'

  # ── FRONTEND ────────────────────────────────────────────

  # Step 4: Build frontend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    waitFor: ['deploy-backend']
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/frontend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/frontend:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://brain-tumor-backend-$(gcloud run services describe brain-tumor-backend --region=us-central1 --format="value(status.url)" | sed "s/https:\/\///g")'
      - './frontend'

  # Step 5: Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend']
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/frontend'

  # Step 6: Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'brain-tumor-frontend'
      - '--image=us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/frontend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--port=3000'

# Store images
images:
  - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/backend:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/brain-tumor-ai-prod/brain-tumor-repo/frontend:$COMMIT_SHA'

timeout: '1800s'
