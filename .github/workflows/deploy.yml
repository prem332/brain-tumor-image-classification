name: Deploy Brain Tumor AI

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
  REGION: us-central1
  SERVICE_NAME: brain-tumor-backend
  REPO: brain-tumor-repo

jobs:
  deploy:
    name: Build and Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/brain-tumor-repo/backend:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/brain-tumor-repo/backend:latest \
            ./backend

      - name: Push Docker image
        run: |
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/brain-tumor-repo/backend:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/brain-tumor-repo/backend:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy brain-tumor-backend \
            --image=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/brain-tumor-repo/backend:${{ github.sha }} \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --timeout=120 \
            --port=8080

      - name: Get Cloud Run URL
        run: |
          gcloud run services describe brain-tumor-backend \
            --region=us-central1 \
            --format="value(status.url)"
